    <Style>   
/* 🔴 STEP 1: This CSS rule turns it OFF by default */
.sidebar {
    display: none; /* Hides it completely from the screen */
}

/* 🟢 STEP 2: This CSS rule turns it ON when the button adds the 'active' class */
.sidebar.active {
    display: block; /* Shows it instantly on the screen */
}
/* 🔴 CLOSED STATE: Hidden off-screen to the left */
/* --- SIDEBAR RULES --- */
.sidebar {
    position: fixed;
    top: 0;
    left: -250px; /* Hidden off-screen left */
    width: 250px;
    height: 100vh;
    background-color: #c81414;
    transition: left 0.3s ease;
}
.sidebar.active {
    left: 0; /* Slides into view */
}


/* --- MAIN CONTENT RULES --- */
.content {
    position: relative;
    left: 0; /* Starts at normal position */
    transition: left 0.3s ease; /* Matches the sidebar speed perfectly */
}
.content.active {
    left: 250px; /* Shifts right exactly by the width of the sidebar */
}
    </Style>
</head>
