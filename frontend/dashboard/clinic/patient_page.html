<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Patients | SmartCare</title>
    <link rel="stylesheet" href="../../assets/css/sidebar.css">
    <link rel="stylesheet" href="../../assets/css/clinic/patient.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="sidebar-container"></div>
    <button class="toggle-btn" id="toggle-btn" onclick="toggleSidebar()" aria-label="Toggle sidebar">☰</button>
    <div id="topbar"></div>
    <main class="main-content" id="main-content">
        <div class="page-heading">
            <div><h2>Patients</h2><p>Manage patient records connected to SmartCare.</p></div>
            <button class="primary-button" id="add-patient"><i class="fa-solid fa-plus"></i> Add patient</button>
        </div>
        <div id="message" class="message" role="status" hidden></div>
        <section class="card"><div class="table-wrap">
            <table>
                <thead><tr><th>Name</th><th>User ID</th><th>Age</th><th>Gender</th><th>Contact</th><th>Address</th><th>Actions</th></tr></thead>
                <tbody id="patient-table-body"><tr><td colspan="7" class="loading">Loading patients…</td></tr></tbody>
            </table>
        </div></section>
    </main>
    <dialog id="patient-dialog">
        <form id="patient-form" method="dialog">
            <div class="dialog-header"><h3 id="form-title">Add patient</h3><button type="button" class="icon-button" id="close-dialog" aria-label="Close">×</button></div>
            <input id="patient-id" type="hidden" />
            <div class="form-grid">
                <label>Name<input id="name" maxlength="100" required /></label>
                <label>User ID<input id="user-id" type="number" min="1" required /></label>
                <label>Age<input id="age" type="number" min="0" max="150" required /></label>
                <label>Gender<input id="gender" maxlength="20" required /></label>
                <label>Contact number<input id="contactno" maxlength="15" required /></label>
                <label class="wide">Address<input id="address" maxlength="100" required /></label>
            </div>
            <div class="dialog-actions"><button type="button" class="secondary-button" id="cancel-dialog">Cancel</button><button class="primary-button" type="submit">Save patient</button></div>
        </form>
    </dialog>
    <script src="../../assets/js/sidePanel/clinic.js"></script>
    <script src="../../assets/js/clinic/patient.js"></script>
</body>
</html>
