<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Clinic Management | SmartCare</title>
    <!-- <link rel="stylesheet" href="style.css" /> -->
    <link rel="stylesheet" href="../../assets/css/sidebar.css">
    <link rel="stylesheet" href="../../assets/css/clinic/appointment.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity=""
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>
     <button class="toggle-btn" id="toggle-btn" onclick="toggleSidebar()">☰</button>
    <div id="topbar"></div>
<main class="main-content" id="main-content">
    <section class="dashboard-main">
        <div class="stats-grid">
            <article class="dashboard-card stat-card">
                <h3>Today's Appointments</h3>
                <strong>24</strong>
                <p>Scheduled visits across clinics</p>
            </article>
            <article class="dashboard-card stat-card">
                <h3>Pending Payments</h3>
                <strong>6</strong>
                <p>Awaiting confirmation</p>
            </article>
            <article class="dashboard-card stat-card">
                <h3>Completed</h3>
                <strong>18</strong>
                <p>Successful appointments</p>
            </article>
        </div>
        <article class="dashboard-card appointment-panel">
            <div class="appointment-header">
                <div>
                    <p class="eyebrow">Clinic Operations</p>
                    <h3>Appointment Management</h3>
                </div>
                <div class="search-box">
                    <input type="text" id="appointmentSearch" placeholder="Search patient or doctor..." />
                </div>
            </div>
            <div class="table-wrap">
                <table class="data-table appointment-table">
                    <thead>
                        <tr>
                            <th>Appointment ID</th>
                            <th>Patient Name</th>
                            <th>Doctor</th>
                            <th>Date &amp; Time</th>
                            <th>Payment Status</th>                            
                        </tr>
                    </thead>
                    <tbody id="appointmentTableBody">
                        <p>..........loding......</p>
                    </tbody>
                </table>
            </div>
        </article>
    </section>
</main>

    <script src="../../assets/js/sidePanel/clinic.js"></script>
</body>
</html>
